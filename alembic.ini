[alembic]
# Path to migration scripts
script_location = migrations
# Default DB URL for local dev. Overridden by DATABASE_URL_SYNC env var in
# migrations/env.py when running inside Docker.
sqlalchemy.url = postgresql://pentest:pentest@localhost:5432/pentest

# ── Logging ──────────────────────────────────────────────────────────────────

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
