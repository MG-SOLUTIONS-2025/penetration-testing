upstream api {
    server api:8000;
    keepalive 32;
}

upstream frontend {
    server frontend:80;
}

upstream flower {
    server flower:5555;
}

server {
    listen 80;
    # Use Docker's embedded DNS resolver so upstream IPs re-resolve after container restarts
    resolver 127.0.0.11 valid=5s;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/ {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    location /health {
        proxy_pass http://api;
    }

    # FastAPI auto-generated docs (Swagger UI + OpenAPI schema)
    location /docs {
        proxy_pass http://api;
    }
    location /redoc {
        proxy_pass http://api;
    }
    location /openapi.json {
        proxy_pass http://api;
    }

    # Flower admin panel (basic-auth enforced by Flower itself)
    location /flower/ {
        proxy_pass http://flower/flower/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
    }
}
