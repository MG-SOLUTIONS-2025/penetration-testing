services:
  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: pentest
      POSTGRES_USER: pentest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentest_dev_2026}
    # No host port binding — internal only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pentest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_2026}
    # No host port binding — internal only
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2026}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_not_for_production}
      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-http://defectdojo:8080}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uv run celery -A src.worker.celery_app worker --loglevel=info -Q scans,celery
    volumes:
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_not_for_production}
      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-http://defectdojo:8080}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}
    user: "1000:1000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  beat:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uv run celery -A src.worker.celery_app beat --loglevel=info
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}
      SECRET_KEY: ${SECRET_KEY:-dev_secret_key_not_for_production}
      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}

  flower:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      uv run celery -A src.worker.celery_app flower
      --port=5555
      --basic-auth=${FLOWER_BASIC_AUTH:-admin:flower_dev}
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
    # Flower behind nginx, no direct host exposure
    expose:
      - "5555"

  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl.conf:/etc/nginx/snippets/ssl.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"

volumes:
  pgdata:
