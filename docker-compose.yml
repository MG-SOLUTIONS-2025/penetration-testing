name: pentest-platform

# Usage:
#   make deploy          — stop port-3102 conflict, build, migrate, start
#   make up              — docker compose up -d (assumes port 3102 is free)
#   make down            — stop all services
#   make logs            — tail all logs
#
# First run: make deploy — builds, migrates, and starts all services.

services:

  # ── Data layer ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres-dev.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      POSTGRES_DB: pentest
      POSTGRES_USER: pentest
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pentest_dev_2026}
      POSTGRES_INITDB_ARGS: "--nosync"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pentest"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 300s
    restart: unless-stopped
    networks:
      - pentest-net

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_2026}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_2026}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - pentest-net

  # ── One-shot migration (runs alembic upgrade head on every deploy) ────────

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uv run --no-dev alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest?ssl=disable
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
    restart: "no"
    networks:
      - pentest-net

  # ── Application services ──────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      uv run --no-dev uvicorn src.api.app:app
      --host 0.0.0.0 --port 8000
      --workers 2
      --access-log
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest?ssl=disable
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}

      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-http://defectdojo-web:8081}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
    restart: unless-stopped
    networks:
      - pentest-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,json; r=urllib.request.urlopen('http://localhost:8000/health'); d=json.load(r); assert d.get('api')=='ok'\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      uv run --no-dev celery -A src.worker.celery_app worker
      --loglevel=info
      --concurrency=4
      -Q scans,celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      # Celery worker needs docker.sock to launch scan containers
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "999"  # docker group GID on this host
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest?ssl=disable
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}

      DEFECTDOJO_URL: ${DEFECTDOJO_URL:-http://defectdojo-web:8081}
      DEFECTDOJO_API_KEY: ${DEFECTDOJO_API_KEY:-}
      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      METASPLOIT_HOST: ${METASPLOIT_HOST:-msfrpcd}
      METASPLOIT_PORT: ${METASPLOIT_PORT:-55553}
      METASPLOIT_PASSWORD: ${METASPLOIT_PASSWORD:-}
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    networks:
      - pentest-net

  beat:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      uv run --no-dev celery -A src.worker.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest?ssl=disable
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_dev_2026}

      CELERY_FERNET_KEY: ${CELERY_FERNET_KEY:-}
    restart: unless-stopped
    networks:
      - pentest-net

  flower:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: >
      uv run --no-dev celery -A src.worker.celery_app flower
      --port=5555
      --basic-auth=${FLOWER_BASIC_AUTH:-admin:flower_dev_2026}
      --url-prefix=/flower
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_2026}@redis:6379/0
      DATABASE_URL: postgresql+asyncpg://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest?ssl=disable
      DATABASE_URL_SYNC: postgresql://pentest:${POSTGRES_PASSWORD:-pentest_dev_2026}@postgres:5432/pentest
    restart: unless-stopped
    networks:
      - pentest-net

  # ── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3102}
    restart: unless-stopped
    networks:
      - pentest-net

  # ── Reverse proxy (exposed on host port 3102) ─────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "3102:80"
    restart: unless-stopped
    networks:
      - pentest-net

networks:
  pentest-net:
    driver: bridge

volumes:
  pgdata:
